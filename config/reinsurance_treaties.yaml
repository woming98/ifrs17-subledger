# IFRS 17 Reinsurance Treaty Programme
#
# Structure:
#   - QS (Quota Share)      : simple proportional treaty
#   - XL (Excess-of-Loss)   : layered structure, pre-computed to effective rates
#
# For XL treaties, effective_cession_rate is pre-calculated assuming total-loss:
#   effective_rate = layer_size × cession_rate / sum_insured
#
# TERM_GMM_2022 example (sum insured = 500k):
#   L1 (0–300k):   Hanover 20%  → 300k × 20% / 500k = 12%
#   L2 (300k–600k): MR 20%      → 200k × 20% / 500k =  8%
#   L2 (300k–600k): BOC 80%     → 200k × 80% / 500k = 32%
#   Retention:                  → 300k × 80% / 500k = 48%
#   Total                                             = 100% ✓
#
# In production, Prophet outputs PVFCF per reinsurer directly.
# effective_cession_rate is then simply PVFCF_ceded / PVFCF_gross.

treaties:

  # ── TERM_GMM_2022: 2-layer XL (pre-computed effective rates) ─────────────────
  - treaty_id:              TERM_HAN
    cohort_id:              TERM_GMM_2022
    reinsurer:              "Hanover Re"
    layer_label:            "XL 12%"
    effective_cession_rate: 0.12

  - treaty_id:              TERM_MR
    cohort_id:              TERM_GMM_2022
    reinsurer:              "Munich Re"
    layer_label:            "XL 8%"
    effective_cession_rate: 0.08

  - treaty_id:              TERM_BOC
    cohort_id:              TERM_GMM_2022
    reinsurer:              "BOC Re"
    layer_label:            "XL 32%"
    effective_cession_rate: 0.32

  # ── MED_GMM_2021: Quota Share ─────────────────────────────────────────────────
  - treaty_id:              MED_GMM_QS
    cohort_id:              MED_GMM_2021
    reinsurer:              "Munich Re"
    layer_label:            "QS 20%"
    effective_cession_rate: 0.20

  # ── MED_GMM_ONR: Quota Share (onerous cohort) ─────────────────────────────────
  - treaty_id:              MED_ONR_QS
    cohort_id:              MED_GMM_ONR
    reinsurer:              "Munich Re"
    layer_label:            "QS 15%"
    effective_cession_rate: 0.15

  # ── MED_PAA: Quota Share ──────────────────────────────────────────────────────
  - treaty_id:              MED_PAA_QS
    cohort_id:              MED_PAA
    reinsurer:              "Hannover Life Re"
    layer_label:            "QS 25%"
    effective_cession_rate: 0.25

  # ── WL_VFA_2019: Quota Share ──────────────────────────────────────────────────
  - treaty_id:              WL_VFA_QS
    cohort_id:              WL_VFA_2019
    reinsurer:              "Swiss Re"
    layer_label:            "QS 20%"
    effective_cession_rate: 0.20

  # RIDER_PAA, ENDO_VFA_2022: no reinsurance
