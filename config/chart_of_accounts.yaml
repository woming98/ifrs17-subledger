# IFRS 17 示例科目表（Chart of Accounts）
# ──────────────────────────────────────────────────────────────────────────────
# 分类：
#   1xxx  资产
#   2xxx  负债（ICL / RCA 均在此，RCA 为合同资产，用负数余额表示净资产）
#   3xxx  权益
#   4xxx  利润表（收入/费用）
#   5xxx  其他综合收益（OCI）
# ──────────────────────────────────────────────────────────────────────────────

accounts:

  # ── 资产 ───────────────────────────────────────────────────────────────────
  assets:
    - code: "1100"
      name: "现金及银行存款"
    - code: "1200"
      name: "投资资产"
    - code: "1900"
      name: "保费应收 / 理赔应付（净轧差）"

  # ── IFRS 17 负债：直接业务 ICL（保险合同负债）──────────────────────────────
  icl_lrc:
    - code: "2100"
      name: "ICL-LRC — PVFCF（未来现金流现值）"
    - code: "2110"
      name: "ICL-LRC — RA（风险调整）"
    - code: "2120"
      name: "ICL-LRC — CSM（合同服务边际）"
    - code: "2130"
      name: "ICL-LRC — LC（亏损部分）"

  icl_lic:
    - code: "2200"
      name: "ICL-LIC（已发生理赔负债）"
    - code: "2210"
      name: "ICL-LIC — IBNR（已发生未报告）"

  # ── IFRS 17 资产：再保险合同资产（RCA）────────────────────────────────────
  rca:
    - code: "2300"
      name: "RCA — PVFCF（分出未来现金流现值）"
    - code: "2310"
      name: "RCA — RA（分出风险调整）"
    - code: "2320"
      name: "RCA — CSM（分出合同服务边际）"
    - code: "2330"
      name: "RCA — 分出亏损部分回收"

  # ── 权益 ───────────────────────────────────────────────────────────────────
  equity:
    - code: "3100"
      name: "留存收益 / 新业务首次确认对侧"
    - code: "3200"
      name: "其他综合收益累计（OCI 累计）"

  # ── 利润表：保险服务结果 ────────────────────────────────────────────────────
  insurance_pl:
    - code: "4100"
      name: "保险收入（Insurance Revenue / ISR）"
    - code: "4110"
      name: "保险收入 — 预期现金流释放"
    - code: "4120"
      name: "保险收入 — RA 释放"
    - code: "4130"
      name: "保险收入 — CSM 摊销"
    - code: "4140"
      name: "保险收入 — LC 回转"
    - code: "4200"
      name: "保险服务费用（Insurance Service Expense / ISE）"
    - code: "4210"
      name: "保险服务费用 — 经验差异"
    - code: "4220"
      name: "保险服务费用 — LC 确认（亏损合同首次）"
    - code: "4230"
      name: "保险服务费用 — 假设变更（RA / P&L 部分）"
    - code: "4240"
      name: "保险服务费用 — 获取成本摊销（IACF，PAA）"

  # ── 利润表：保险融资收入 / 费用（IFIE）──────────────────────────────────────
  ifie_pl:
    - code: "4300"
      name: "IFIE — P&L（保险融资费用，按 DAIR 展开折现）"
    - code: "4310"
      name: "IFIE — P&L（再保险 RCA 端，分出方收入）"

  # ── 其他综合收益（OCI）────────────────────────────────────────────────────
  oci:
    - code: "5100"
      name: "OCI — IFIE（当前利率 vs DAIR 差异）"
    - code: "5110"
      name: "OCI — FX 汇率折算差异"
    - code: "5120"
      name: "OCI — 再保险 RCA 端利率差异"
