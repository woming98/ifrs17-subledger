# IFRS 17 Chart of Accounts (Example)
# ──────────────────────────────────────────────────────────────────────────────
# Classification:
#   1xxx  Assets
#   2xxx  Liabilities (ICL / RCA; RCA carries a negative balance as a net asset)
#   3xxx  Equity
#   4xxx  Income Statement (Revenue / Expense)
#   5xxx  Other Comprehensive Income (OCI)
# ──────────────────────────────────────────────────────────────────────────────

accounts:

  # ── Assets ─────────────────────────────────────────────────────────────────
  assets:
    - code: "1100"
      name: "Cash and Bank Deposits"
    - code: "1200"
      name: "Investment Assets"
    - code: "1900"
      name: "Premium Receivable / Claims Payable (Net)"

  # ── IFRS 17 Liabilities: Direct Business ICL (Insurance Contract Liability) ─
  icl_lrc:
    - code: "2100"
      name: "ICL-LRC — PVFCF (Present Value of Future Cash Flows)"
    - code: "2110"
      name: "ICL-LRC — RA (Risk Adjustment)"
    - code: "2120"
      name: "ICL-LRC — CSM (Contractual Service Margin)"
    - code: "2130"
      name: "ICL-LRC — LC (Loss Component)"

  icl_lic:
    - code: "2200"
      name: "ICL-LIC (Liability for Incurred Claims)"
    - code: "2210"
      name: "ICL-LIC — IBNR (Incurred But Not Reported)"

  # ── IFRS 17 Assets: Reinsurance Contract Assets (RCA) ──────────────────────
  rca:
    - code: "2300"
      name: "RCA — PVFCF (Ceded PVFCF)"
    - code: "2310"
      name: "RCA — RA (Ceded Risk Adjustment)"
    - code: "2320"
      name: "RCA — CSM (Ceded CSM)"
    - code: "2330"
      name: "RCA — Ceded Loss Component Recovery"

  # ── Equity ─────────────────────────────────────────────────────────────────
  equity:
    - code: "3100"
      name: "Retained Earnings / New Business Day-1 Offset"
    - code: "3200"
      name: "Accumulated OCI"

  # ── Income Statement: Insurance Service Result ──────────────────────────────
  insurance_pl:
    - code: "4100"
      name: "Insurance Revenue (ISR)"
    - code: "4110"
      name: "Insurance Revenue — Expected CF Release"
    - code: "4120"
      name: "Insurance Revenue — RA Release"
    - code: "4130"
      name: "Insurance Revenue — CSM Amortisation"
    - code: "4140"
      name: "Insurance Revenue — LC Reversal"
    - code: "4200"
      name: "Insurance Service Expense (ISE)"
    - code: "4210"
      name: "Insurance Service Expense — Experience Variance"
    - code: "4220"
      name: "Insurance Service Expense — LC Recognition (Onerous)"
    - code: "4230"
      name: "Insurance Service Expense — Assumption Changes (RA / P&L)"
    - code: "4240"
      name: "Insurance Service Expense — IACF Amortisation (PAA)"

  # ── Income Statement: Insurance Finance Income / Expense (IFIE) ────────────
  ifie_pl:
    - code: "4300"
      name: "IFIE — P&L (Finance charge at locked-in rate DAIR)"
    - code: "4310"
      name: "IFIE — P&L (RCA side — ceded finance income)"

  # ── Other Comprehensive Income (OCI) ───────────────────────────────────────
  oci:
    - code: "5100"
      name: "OCI — IFIE (Current rate vs DAIR difference)"
    - code: "5110"
      name: "OCI — FX Translation Difference"
    - code: "5120"
      name: "OCI — RCA Finance Rate Difference"
